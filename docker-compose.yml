version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: iminds_postgres
    environment:
      POSTGRES_DB: iminds_tutorials
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iminds_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/iminds_tutorials
      JWT_SECRET: change-me-in-production
      PORT: 4000
      NODE_ENV: development
      PAYMENT_GATEWAY: mock
      STORAGE_PROVIDER: supabase
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  postgres_data:
